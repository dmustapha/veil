name: prove

# Produces the REAL RISC Zero Groth16 proof for Veil on a free GitHub-hosted x86 runner
# (16 GB RAM, the spec local Groth16 proving needs). No Bonsai key, no cost. The guest reads the
# committed fixture (guest/fixtures), so this run needs no secrets and no live RPC.
# The resulting proof.json (seal + image_id + journal) is uploaded as an artifact.

on:
  workflow_dispatch:
    inputs:
      fixture_b64:
        description: "base64 of a user's eth_getProof JSON (overwrites the committed fixture)"
        required: false
        default: ""
      meta_b64:
        description: "base64 of the matching fixture_meta JSON"
        required: false
        default: ""
  push:
    paths:
      - "guest/**"
      - ".github/workflows/prove.yml"

jobs:
  groth16:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            guest/target
          key: veil-prove-${{ hashFiles('guest/**/Cargo.toml') }}

      - name: Install RISC Zero toolchain
        run: |
          curl -L https://risczero.com/install | bash
          echo "$HOME/.risc0/bin" >> "$GITHUB_PATH"
          "$HOME/.risc0/bin/rzup" install
          "$HOME/.risc0/bin/rzup" install risc0-groth16 || true

      - name: Environment check
        run: |
          docker --version
          free -h
          nproc
          rzup show || true

      # When dispatched with a user's lock, overwrite the committed fixture so the host proves
      # the USER's lock. The host (guest/host) and the guest are untouched: they read these two
      # files exactly as before. With no inputs (push, or a plain dispatch) the committed pinned
      # fixture is used, preserving the original behavior.
      - name: Write user fixture (if provided)
        if: ${{ github.event.inputs.fixture_b64 != '' }}
        working-directory: guest/fixtures
        run: |
          printf '%s' "${{ github.event.inputs.fixture_b64 }}" | base64 -d > eth_getproof_pinned.json
          printf '%s' "${{ github.event.inputs.meta_b64 }}" | base64 -d > fixture_meta.json
          echo "Using user-supplied fixture:"
          cat fixture_meta.json

      - name: Generate real Groth16 proof
        working-directory: guest
        env:
          RUST_LOG: info
        run: cargo run --release

      - name: Show proof.json
        working-directory: guest
        run: cat proof.json

      - name: Upload proof artifact
        uses: actions/upload-artifact@v4
        with:
          name: veil-proof
          path: guest/proof.json
          if-no-files-found: error
